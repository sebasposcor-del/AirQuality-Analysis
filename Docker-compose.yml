services:
  etl:
    build: .
    container_name: airquality_etl
    volumes:
      - ./etl:/app/etl
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    working_dir: /app
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root
    ports:
      - "8888:8888"